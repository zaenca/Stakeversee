name: Stakeversee one-time bank stats fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/stakeversee-bank-stats-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch Stakeversee files
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pagePath = 'app/page.tsx';
          const cssPath = 'app/globals.css';
          let page = fs.readFileSync(pagePath, 'utf8');
          let css = fs.readFileSync(cssPath, 'utf8');

          function mustReplace(label, needle, replacement) {
            if (!page.includes(needle)) throw new Error(label + ' not found');
            page = page.replace(needle, replacement);
          }

          if (!page.includes('const BASE_BANKROLL = 10000;')) {
            mustReplace('coupon const', 'const MAX_COUPON_ITEMS = 5;\n', 'const MAX_COUPON_ITEMS = 5;\nconst BASE_BANKROLL = 10000;\n');
          }

          page = page.replace('.replace(/[^\\p{L}\\p{N}]+/gu, " ")', '.replace(/[^0-9a-zа-я]+/gi, " ")');

          if (!page.includes('function formatEventName(value: string): string')) {
            const helpers = [
              '',
              'function formatEventName(value: string): string {',
              '  return value.replace(/\\s+vs\\s+/gi, " - ").replace(/\\s+-\\s+/g, " - ").trim();',
              '}',
              '',
              'function betProfitValue(bet: BetRow): number {',
              '  if (bet.profit !== null && bet.profit !== undefined) return Number(bet.profit || 0);',
              '',
              '  const stake = Number(bet.stake || 0);',
              '  const odds = Number(bet.odds || 0);',
              '  if (bet.result === "win") return stake * odds - stake;',
              '  if (bet.result === "loss") return -stake;',
              '  return 0;',
              '}',
              '',
              'function resultLabel(result: BetRow["result"]): string {',
              '  if (result === "win") return "Выигрыш";',
              '  if (result === "loss") return "Проигрыш";',
              '  if (result === "return") return "Возврат";',
              '  return "Ожидает";',
              '}',
              ''
            ].join('\n');
            page = page.replace(/function searchHaystack\(\.\.\.parts: string\[\]\): string \{\n[\s\S]*?\n\}\n/, match => match + helpers);
          }

          page = page.replace(/  const sourceStats = useMemo\(\(\) => \{\n[\s\S]*?\n  \}, \[bets, sources\]\);/, [
            '  const sourceStats = useMemo(() => {',
            '    return sources.map(source => {',
            '      const sourceBets = bets.filter(bet => bet.source_id === source.id);',
            '      const closed = sourceBets.filter(bet => bet.result !== "pending");',
            '      const profit = closed.reduce((sum, bet) => sum + betProfitValue(bet), 0);',
            '      const stake = closed.reduce((sum, bet) => sum + Number(bet.stake || 0), 0);',
            '      const totalStake = sourceBets.reduce((sum, bet) => sum + Number(bet.stake || 0), 0);',
            '      const avgOdds = sourceBets.length',
            '        ? sourceBets.reduce((sum, bet) => sum + Number(bet.odds || 0), 0) / sourceBets.length',
            '        : 0;',
            '',
            '      return {',
            '        ...source,',
            '        avgOdds,',
            '        bets: sourceBets.length,',
            '        losses: sourceBets.filter(bet => bet.result === "loss").length,',
            '        pending: sourceBets.filter(bet => bet.result === "pending").length,',
            '        profit,',
            '        returns: sourceBets.filter(bet => bet.result === "return").length,',
            '        roi: stake > 0 ? (profit / stake) * 100 : 0,',
            '        stake: totalStake,',
            '        wins: sourceBets.filter(bet => bet.result === "win").length',
            '      };',
            '    }).sort((first, second) => second.bets - first.bets || first.name.localeCompare(second.name, "ru"));',
            '  }, [bets, sources]);'
          ].join('\n'));

          page = page.replace('.limit(25),', '.limit(1000),');
          page = page.replace('.limit(30)', '.limit(2000)');
          page = page.replace('eventName: `${match.home} vs ${match.away}`,', 'eventName: `${match.home} - ${match.away}`,');
          page = page.replace('const displayedBalance = bankrollStats.balance || 10000;', 'const displayedBalance = BASE_BANKROLL + bankrollStats.balance;');
          page = page.replaceAll('<strong>{bet.event_name}</strong>', '<strong>{formatEventName(bet.event_name)}</strong>');
          page = page.replace('<b>VS</b>', '<b>-</b>');

          const statsStart = page.indexOf('            {statsOpen ? <section className="rail-panel stats-panel">');
          const statsEnd = page.indexOf('          </aside>', statsStart);
          if (statsStart === -1 || statsEnd === -1) throw new Error('stats panel block not found');
          const statsBlock = [
            '            {statsOpen ? <section className="rail-panel stats-panel">',
            '              <div className="rail-title">Статистика</div>',
            '              <div className="rail-stat-grid">',
            '                <div><span>Средний кэф</span><strong>{betStats.avgOdds.toFixed(2)}</strong></div>',
            '                <div><span>Закрыто</span><strong>{betStats.closed}</strong></div>',
            '                <div><span>Ожидают</span><strong>{betStats.pending}</strong></div>',
            '                <div><span>P&L</span><strong>{formatMoney(betStats.profit)}</strong></div>',
            '              </div>',
            '',
            '              <div className="stats-block">',
            '                <div className="stats-block-head">',
            '                  <strong>Источники</strong>',
            '                  <span>{sourceStats.length}</span>',
            '                </div>',
            '                <div className="source-stat-list">',
            '                  {sourceStats.length ? sourceStats.map(source => (',
            '                    <article className={"source-stat-card " + (source.is_blacklisted ? "blacklisted" : "")} key={source.id}>',
            '                      <div className="source-stat-top">',
            '                        <strong>{source.name}</strong>',
            '                        <span>ROI {source.roi >= 0 ? "+" : ""}{source.roi.toFixed(1)}%</span>',
            '                      </div>',
            '                      <div className="source-stat-grid">',
            '                        <div><span>Ставок</span><strong>{source.bets}</strong></div>',
            '                        <div><span>В/П</span><strong>{source.wins}/{source.losses}</strong></div>',
            '                        <div><span>Сумма</span><strong>{formatMoney(source.stake)}</strong></div>',
            '                        <div><span>P&L</span><strong>{formatMoney(source.profit)}</strong></div>',
            '                      </div>',
            '                    </article>',
            '                  )) : <span className="empty">Источники появятся после ставок.</span>}',
            '                </div>',
            '              </div>',
            '',
            '              <div className="stats-block">',
            '                <div className="stats-block-head">',
            '                  <strong>Матчи</strong>',
            '                  <span>{bets.length}</span>',
            '                </div>',
            '                <div className="bets-table rail-bets">',
            '                  {bets.slice(0, 30).map(bet => {',
            '                    const sourceName = bet.source_id ? sourceById.get(bet.source_id)?.name : "";',
            '                    const profit = betProfitValue(bet);',
            '',
            '                    return (',
            '                      <div className="rail-bet-card" key={bet.id}>',
            '                        <div className="rail-bet-main">',
            '                          <strong>{formatEventName(bet.event_name)}</strong>',
            '                          <span>{bet.market} · {bet.selection} · {formatMoney(Number(bet.stake || 0))} · ×{Number(bet.odds).toFixed(2)}</span>',
            '                        </div>',
            '                        <div className="rail-bet-meta">',
            '                          <span>{bet.bookmaker || "БК —"}</span>',
            '                          <em>{sourceName || "Источник —"}</em>',
            '                          <strong className={"result-pill " + bet.result}>',
            '                            {resultLabel(bet.result)}',
            '                            {bet.result !== "pending" ? " · " + formatMoney(profit) : ""}',
            '                          </strong>',
            '                        </div>',
            '                      </div>',
            '                    );',
            '                  })}',
            '                  {!bets.length ? <span className="empty">Ставки появятся после сохранения прогноза.</span> : null}',
            '                </div>',
            '              </div>',
            '            </section> : null}',
            ''
          ].join('\n');
          page = page.slice(0, statsStart) + statsBlock + page.slice(statsEnd);

          if (!css.includes('.right-rail .quick-coupon-card:not(.open)')) {
            css += '\n.right-rail .quick-coupon-card:not(.open) {\n  display: none;\n}\n';
          }
          if (!css.includes('.stats-block {')) {
            css += [
              '',
              '.stats-block { display: grid; gap: 10px; margin-top: 14px; }',
              '.stats-block-head { align-items: center; color: var(--muted); display: flex; font-size: 0.72rem; justify-content: space-between; letter-spacing: 0.12em; text-transform: uppercase; }',
              '.stats-block-head strong { color: var(--text); }',
              '.stats-block-head span { background: rgba(0, 229, 255, 0.12); border: 1px solid rgba(0, 229, 255, 0.24); border-radius: 999px; color: var(--cyan); padding: 2px 8px; }',
              '.source-stat-list { display: grid; gap: 8px; }',
              '.source-stat-card, .rail-bet-card { background: rgba(255, 255, 255, 0.035); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }',
              '.source-stat-card.blacklisted { border-color: rgba(255, 55, 133, 0.32); opacity: 0.58; }',
              '.source-stat-top { align-items: center; display: flex; gap: 8px; justify-content: space-between; margin-bottom: 8px; }',
              '.source-stat-top strong { color: var(--text); font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }',
              '.source-stat-top span { color: var(--cyan); font-size: 0.72rem; font-weight: 900; white-space: nowrap; }',
              '.source-stat-grid { display: grid; gap: 6px; grid-template-columns: repeat(2, minmax(0, 1fr)); }',
              '.source-stat-grid div { background: rgba(9, 15, 24, 0.58); border: 1px solid rgba(130, 158, 190, 0.12); border-radius: 6px; padding: 7px; }',
              '.source-stat-grid span, .rail-bet-main span { color: var(--muted); font-size: 0.66rem; }',
              '.source-stat-grid strong { color: var(--text); display: block; font-size: 0.78rem; margin-top: 3px; }',
              '.rail-bet-card { display: grid; gap: 8px; }',
              '.rail-bet-main { display: grid; gap: 4px; min-width: 0; }',
              '.rail-bet-main strong { color: var(--text); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }',
              '.rail-bet-meta { align-items: center; display: grid; gap: 6px; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto; }',
              '.rail-bet-meta span, .rail-bet-meta em, .result-pill { border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 999px; color: var(--cyan); font-size: 0.62rem; font-style: normal; font-weight: 900; overflow: hidden; padding: 4px 7px; text-overflow: ellipsis; white-space: nowrap; }',
              '.rail-bet-meta em { border-color: rgba(139, 92, 246, 0.32); color: #d9c8ff; }',
              '.result-pill { border-color: rgba(130, 158, 190, 0.22); color: var(--muted); }',
              '.result-pill.win { border-color: rgba(0, 224, 138, 0.36); color: var(--green); }',
              '.result-pill.loss { border-color: rgba(255, 55, 133, 0.38); color: var(--red); }',
              '.result-pill.return { border-color: rgba(255, 193, 7, 0.45); color: var(--amber); }',
              ''
            ].join('\n');
          }

          fs.writeFileSync(pagePath, page);
          fs.writeFileSync(cssPath, css);
          NODE
      - name: Commit patch
        run: |
          git config user.name "stakeversee-bot"
          git config user.email "stakeversee-bot@users.noreply.github.com"
          rm -f .github/workflows/stakeversee-bank-stats-fix.yml
          git add app/page.tsx app/globals.css .github/workflows/stakeversee-bank-stats-fix.yml
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Improve bankroll stats panel"
            git push
          fi
# trigger: 2026-07-13T10:18:00+07:00
