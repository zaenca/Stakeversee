name: Stakeversee calendar created date fix

on:
  push:
    paths:
      - .github/workflows/stakeversee-calendar-created-date-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch calendar date basis
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'app/page.tsx';
          let text = fs.readFileSync(file, 'utf8');
          const oldLine = '    .filter(bet => dateKeyFromIso(bet.settled_at) === key)';
          const newLine = '    .filter(bet => dateKeyFromIso(bet.created_at) === key)';
          if (!text.includes(newLine)) {
            if (!text.includes(oldLine)) {
              console.error('calendar profit filter line not found');
              process.exit(1);
            }
            text = text.replace(oldLine, newLine);
          }
          fs.writeFileSync(file, text);
          fs.rmSync('.github/workflows/stakeversee-calendar-created-date-fix.yml', { force: true });
          NODE
      - name: Commit patch
        run: |
          git config user.name "stakeversee-bot"
          git config user.email "stakeversee-bot@users.noreply.github.com"
          git add app/page.tsx .github/workflows/stakeversee-calendar-created-date-fix.yml
          git commit -m "Use bet date for calendar pnl" || exit 0
          git push
