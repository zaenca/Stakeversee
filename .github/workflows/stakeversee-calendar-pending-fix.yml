name: Stakeversee calendar pending fix

on:
  push:
    paths:
      - .github/workflows/stakeversee-calendar-pending-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch page and styles
        run: |
          node <<'NODE'
          const fs = require('fs');

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          const pagePath = 'app/page.tsx';
          const cssPath = 'app/globals.css';
          let page = fs.readFileSync(pagePath, 'utf8');
          let css = fs.readFileSync(cssPath, 'utf8');

          const resultLabelBlock = [
            'function resultLabel(result: BetRow["result"]): string {',
            '  if (result === "win") return "Выигрыш";',
            '  if (result === "loss") return "Проигрыш";',
            '  if (result === "return") return "Возврат";',
            '  return "Ожидает";',
            '}',
            ''
          ].join('\n');

          const dateHelpers = [
            'function dateKeyFromDate(value: Date): string {',
            '  const year = value.getFullYear();',
            '  const month = String(value.getMonth() + 1).padStart(2, "0");',
            '  const day = String(value.getDate()).padStart(2, "0");',
            '  return year + "-" + month + "-" + day;',
            '}',
            '',
            'function dateKeyFromIso(value?: string | null): string {',
            '  if (!value) return "";',
            '  const date = new Date(value);',
            '  if (Number.isNaN(date.getTime())) return "";',
            '  return dateKeyFromDate(date);',
            '}',
            '',
            'function calendarProfitForDate(day: Date, settledBets: BetRow[]): number {',
            '  const key = dateKeyFromDate(day);',
            '  return settledBets',
            '    .filter(bet => dateKeyFromIso(bet.settled_at) === key)',
            '    .reduce((sum, bet) => sum + betProfitValue(bet), 0);',
            '}',
            ''
          ].join('\n');

          if (!page.includes('function dateKeyFromDate(value: Date): string')) {
            if (!page.includes(resultLabelBlock)) fail('resultLabel block not found');
            page = page.replace(resultLabelBlock, resultLabelBlock + dateHelpers);
          }

          const balanceLine = '    const displayedBalance = BASE_BANKROLL + bankrollStats.balance;\n';
          const pendingLines = [
            '    const pendingBets = bets.filter(bet => bet.result === "pending");',
            '    const settledBets = bets.filter(bet => bet.result !== "pending" && bet.settled_at);',
            ''
          ].join('\n');
          if (!page.includes('const pendingBets = bets.filter(bet => bet.result === "pending");')) {
            if (!page.includes(balanceLine)) fail('displayedBalance line not found');
            page = page.replace(balanceLine, balanceLine + pendingLines);
          }

          const oldCalendar = [
            '              <div className="calendar-grid">',
            '                {calendarDays.map(day => (',
            '                  <button',
            '                    className={`${day.muted ? "muted" : ""} ${day.current ? "current" : ""}`}',
            '                    key={day.date.toISOString()}',
            '                    type="button"',
            '                  >',
            '                    {day.day}',
            '                    {day.current ? <small>+{Math.max(0, Math.round(betStats.profit))}₽</small> : null}',
            '                  </button>',
            '                ))}',
            '              </div>'
          ].join('\n');

          const newCalendar = [
            '              <div className="calendar-grid">',
            '                {calendarDays.map(day => {',
            '                  const dayProfit = Math.round(calendarProfitForDate(day.date, settledBets));',
            '                  const profitClass = dayProfit > 0 ? "positive" : dayProfit < 0 ? "negative" : "";',
            '',
            '                  return (',
            '                    <button',
            '                      className={[',
            '                        day.muted ? "muted" : "",',
            '                        day.current ? "current" : "",',
            '                        profitClass ? "has-profit " + profitClass : ""',
            '                      ].filter(Boolean).join(" ")}',
            '                      key={day.date.toISOString()}',
            '                      type="button"',
            '                    >',
            '                      {day.day}',
            '                      {dayProfit !== 0 ? <small>{dayProfit > 0 ? "+" : ""}{dayProfit}₽</small> : null}',
            '                    </button>',
            '                  );',
            '                })}',
            '              </div>'
          ].join('\n');

          if (page.includes(oldCalendar)) {
            page = page.replace(oldCalendar, newCalendar);
          } else if (!page.includes('calendarProfitForDate(day.date, settledBets)')) {
            fail('calendar block not found');
          }

          page = page.replace(/bets\.slice\(0,\s*3\)/g, 'pendingBets.slice(0, 3)');
          page = page.replace(/bets\.slice\(0,\s*4\)/g, 'pendingBets.slice(0, 4)');
          page = page.replace(/\{!bets\.length \? <span className="empty">Ставок пока нет\.<\/span> : null\}/g, '{!pendingBets.length ? <span className="empty">Ожидающих ставок нет.</span> : null}');

          const calendarCss = [
            '',
            '.calendar-grid button.has-profit.positive {',
            '  background: rgba(0, 224, 138, 0.16);',
            '  border-color: rgba(0, 224, 138, 0.55);',
            '  color: var(--green);',
            '}',
            '',
            '.calendar-grid button.has-profit.negative {',
            '  background: rgba(255, 55, 126, 0.15);',
            '  border-color: rgba(255, 55, 126, 0.55);',
            '  color: var(--red);',
            '}',
            '',
            '.calendar-grid button.has-profit small {',
            '  color: currentColor;',
            '  font-weight: 900;',
            '}',
            ''
          ].join('\n');
          if (!css.includes('.calendar-grid button.has-profit.positive')) {
            css += calendarCss;
          }

          const railOverride = [
            '',
            '.rail-bet-meta em {',
            '  max-width: none;',
            '  overflow: visible;',
            '  text-overflow: clip;',
            '}',
            ''
          ].join('\n');
          if (!css.includes('.rail-bet-meta em {\n  max-width: none;')) {
            css += railOverride;
          }

          fs.writeFileSync(pagePath, page);
          fs.writeFileSync(cssPath, css);
          fs.rmSync('.github/workflows/stakeversee-calendar-pending-fix.yml', { force: true });
          NODE
      - name: Commit patch
        run: |
          git config user.name "stakeversee-bot"
          git config user.email "stakeversee-bot@users.noreply.github.com"
          git add app/page.tsx app/globals.css .github/workflows/stakeversee-calendar-pending-fix.yml
          git commit -m "Fix calendar pnl and pending bet rail" || exit 0
          git push
